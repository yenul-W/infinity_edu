<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Managing Money — Year 11 Maths Standard</title>
  <link rel="stylesheet" href="../../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="sociotype">

  <header class="topic-header">
    <div class="header-inner">
      <div class="header-nav">
        <a href="../../index.html" class="back-link">&larr; All Topics</a>
        <div class="header-actions">
          <a class="syllabus-chip-inline" href="https://curriculum.nsw.edu.au/learning-areas/mathematics/mathematics-standard-11-12-2024/content/year-11/fa8d2fb431" target="_blank" rel="noreferrer noopener">Syllabus &#8599;</a>
          <button id="darkModeToggle" class="dark-mode-btn" title="Toggle dark mode"><span class="toggle-icon">dark</span></button>
        </div>
      </div>
      <h1 class="topic-page-title">Managing <em>Money</em></h1>
    </div>
  </header>

  <main class="main-content">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div class="pdf-viewer-container">
        <div class="lessons-sidebar" id="lessonsList"></div>

        <div class="pdf-viewer-main">
          <div class="pdf-controls">
            <div class="control-group" id="fileControls">
              <button class="pdf-btn" id="downloadBtn" onclick="downloadPDF()">&#8595; Download</button>
              <a id="openExternalBtn" class="pdf-btn" style="cursor:pointer;" rel="noreferrer">&#8599; Open</a>
            </div>
            <div class="control-group" id="pageControls">
              <button class="pdf-nav-arrow" id="prevBtn" onclick="changePage(-1)" disabled>&#8592;</button>
              <span class="page-info" id="pageInfo">—</span>
              <button class="pdf-nav-arrow" id="nextBtn" onclick="changePage(1)" disabled>&#8594;</button>
            </div>
            <div class="control-group" id="zoomControls">
              <div class="zoom-control">
                <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
                <span class="zoom-display" id="zoomLevel">100%</span>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
              </div>
            </div>
          </div>
          <div class="pdf-viewer" id="pdfViewerContainer">
            <div class="pdf-loading">
              <div class="pdf-loading-spinner"></div>
              <p>Loading...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>Year 11 Mathematics Standard</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const toggle = document.getElementById('darkModeToggle');
    const toggleIcon = toggle.querySelector('.toggle-icon');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = saved ? saved === 'dark' : prefersDark;
    if (isDark) { html.classList.add('dark-mode'); toggleIcon.textContent = 'light'; }
    else { html.classList.remove('dark-mode'); toggleIcon.textContent = 'dark'; }
    toggle.addEventListener('click', () => {
      const nowDark = html.classList.toggle('dark-mode');
      localStorage.setItem('theme', nowDark ? 'dark' : 'light');
      toggleIcon.textContent = nowDark ? 'light' : 'dark';
    });

    const lessons = [
      {
        num: 1,
        title: 'Purchasing Goods',
        file: 'assets/1__Managing_Money___Purchasing_Goods.pdf',
        kind: 'pdf',
        syllabus: [
          'Apply discounts and markups to determine selling prices',
          'Calculate total cost or deposit for goods in Australia and internationally',
          'Solve problems involving GST or VAT',
          'Examine payment options involving interest',
          'Calculate the cost of buying on terms (deposit + regular payments)',
          'Compare and justify different methods of purchasing goods',
          'Calculate the cost of purchasing a vehicle (price, insurance, registration, fuel)'
        ]
      },
      {
        num: 2,
        title: 'Budgeting',
        file: 'assets/2__Managing_Money___Budgeting.pdf',
        kind: 'pdf',
        syllabus: [
          'Examine the ongoing costs of a vehicle',
          'Use a spreadsheet to model the costs of purchasing, running and maintaining a vehicle',
          'Calculate household costs from electricity, water and gas bills',
          'Prepare a personal budget for a given income, considering expenses and savings',
          'Use a spreadsheet to model personal and household budgets',
          'Examine budgeting and emergency fund strategies to minimise financial problems'
        ]
      },
      {
        num: 3,
        title: 'Topic Homework',
        file: 'Managing_Money_Questions.pdf',
        kind: 'pdf',
        syllabus: []
      }
    ];

    let currentLessonFile = '';
    let currentPdfDoc = null;
    let currentPage = 1;
    let zoomLevel = 100;
    let renderTask = null;

    const pdfViewerContainer = document.getElementById('pdfViewerContainer');
    const openExternalBtn = document.getElementById('openExternalBtn');
    const zoomLevelEl = document.getElementById('zoomLevel');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function initializeLessons() {
      const lessonsList = document.getElementById('lessonsList');
      lessons.forEach((lesson, index) => {
        const btn = document.createElement('button');
        btn.className = 'lesson-btn' + (index === 0 ? ' active' : '');
        const syllabusHtml = lesson.syllabus && lesson.syllabus.length > 0
          ? `<div class="lesson-syllabus-dots"><ul>${lesson.syllabus.map(d => `<li>${d}</li>`).join('')}</ul></div>`
          : '';
        btn.innerHTML = `
          <div class="lesson-num">Lesson ${lesson.num}</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-kind">PDF</div>
          ${syllabusHtml}
        `;
        btn.onclick = () => loadLesson(index);
        lessonsList.appendChild(btn);
      });
    }

    async function renderPage(pageNum) {
      if (!currentPdfDoc) return;
      if (renderTask) { renderTask.cancel(); renderTask = null; }

      const page = await currentPdfDoc.getPage(pageNum);
      const containerWidth = pdfViewerContainer.clientWidth - 48;
      const baseViewport = page.getViewport({ scale: 1 });
      const autoScale = Math.min(containerWidth / baseViewport.width, 1.5);
      const scale = (zoomLevel / 100) * autoScale;
      const viewport = page.getViewport({ scale });

      let canvas = document.getElementById('pdf-canvas');
      if (!canvas) {
        canvas = document.createElement('canvas');
        canvas.id = 'pdf-canvas';
        canvas.className = 'pdf-canvas-wrapper';
        pdfViewerContainer.innerHTML = '';
        pdfViewerContainer.appendChild(canvas);
      }

      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.maxWidth = '100%';

      const context = canvas.getContext('2d');
      renderTask = page.render({ canvasContext: context, viewport });
      await renderTask.promise;
      renderTask = null;
    }

    async function loadLesson(index) {
      currentLessonFile = lessons[index].file;
      currentPage = 1;
      zoomLevel = 100;
      zoomLevelEl.textContent = '100%';

      document.querySelectorAll('.lesson-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });

      pdfViewerContainer.innerHTML = '<div class="pdf-loading"><div class="pdf-loading-spinner"></div><p>Loading PDF...</p></div>';
      try {
        currentPdfDoc = await pdfjsLib.getDocument(currentLessonFile).promise;
        openExternalBtn.href = currentLessonFile;
        openExternalBtn.target = '_blank';
        openExternalBtn.textContent = '↗ Open PDF';
        await renderPage(currentPage);
        updatePageButtons();
      } catch (e) {
        pdfViewerContainer.innerHTML = '<div class="pdf-loading"><p>Could not load PDF. <a href="' + currentLessonFile + '" target="_blank" style="color:var(--accent,#000);">Download instead</a></p></div>';
      }
    }

    function updatePageButtons() {
      if (!currentPdfDoc) return;
      const total = currentPdfDoc.numPages;
      document.getElementById('pageInfo').textContent = currentPage + ' / ' + total;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= total;
    }

    async function changePage(delta) {
      if (!currentPdfDoc) return;
      const newPage = currentPage + delta;
      if (newPage < 1 || newPage > currentPdfDoc.numPages) return;
      currentPage = newPage;
      pdfViewerContainer.innerHTML = '<div class="pdf-loading"><div class="pdf-loading-spinner"></div><p>Loading...</p></div>';
      await renderPage(currentPage);
      updatePageButtons();
    }

    function downloadPDF() {
      const link = document.createElement('a');
      link.href = currentLessonFile;
      link.download = currentLessonFile.split('/').pop();
      link.click();
    }

    function zoomIn() {
      zoomLevel = Math.min(zoomLevel + 20, 300);
      zoomLevelEl.textContent = zoomLevel + '%';
      renderPage(currentPage);
    }

    function zoomOut() {
      zoomLevel = Math.max(zoomLevel - 20, 50);
      zoomLevelEl.textContent = zoomLevel + '%';
      renderPage(currentPage);
    }

    initializeLessons();
    loadLesson(0);
  </script>
</body>
</html>
