<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Analysis — Year 11 Maths Standard</title>
  <link rel="stylesheet" href="../../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="sociotype">

  <header class="topic-header">
    <div class="header-inner">
      <div class="header-nav">
        <a href="../../index.html" class="back-link">&larr; All Topics</a>
        <div class="header-actions">
          <a class="syllabus-chip-inline" href="https://curriculum.nsw.edu.au/learning-areas/mathematics/mathematics-standard-11-12-2024/content/year-11/fa4de413b8" target="_blank" rel="noreferrer noopener">Syllabus &#8599;</a>
          <button id="darkModeToggle" class="dark-mode-btn" title="Toggle dark mode"><span class="toggle-icon">dark</span></button>
        </div>
      </div>
      <h1 class="topic-page-title">Data <em>Analysis</em></h1>
    </div>
  </header>

  <main class="main-content">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div class="pdf-viewer-container">
        <div class="lessons-sidebar" id="lessonsList"></div>

        <div class="pdf-viewer-main">
          <div class="pdf-controls">
            <div class="control-group">
              <button class="pdf-btn" id="downloadBtn" onclick="downloadCurrent()">&#8595; Download</button>
              <a id="openExternalBtn" class="pdf-btn" href="#" target="_blank" rel="noreferrer">&#8599; Open</a>
            </div>
          </div>
          <iframe id="pdfFrame" class="pdf-frame" src="" title="PDF Viewer"></iframe>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>Year 11 Mathematics Standard</p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('darkModeToggle');
    const toggleIcon = toggle.querySelector('.toggle-icon');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = saved ? saved === 'dark' : prefersDark;
    if (isDark) { html.classList.add('dark-mode'); toggleIcon.textContent = 'light'; }
    else { html.classList.remove('dark-mode'); toggleIcon.textContent = 'dark'; }
    toggle.addEventListener('click', () => {
      const nowDark = html.classList.toggle('dark-mode');
      localStorage.setItem('theme', nowDark ? 'dark' : 'light');
      toggleIcon.textContent = nowDark ? 'light' : 'dark';
    });

    const lessons = [
      {
        num: 1,
        title: 'Descriptive Statistics',
        slides: 'assets/1__Data_Analysis__Descriptive_Statistics.pdf',
        annotated: 'assets/annotated/ANNOTATED%201__Data_Analysis__Descriptive_Statistics.pdf',
        kind: 'pdf',
        syllabus: [
          'Classify data as numerical or categorical',
          'Describe data as discrete or continuous',
          'Recognise why some data need grouping for appropriate representation',
          'Represent numerical data as frequency tables and histograms',
          'Represent categorical data in tables and column graphs',
          'Identify distribution shapes as symmetric, positively or negatively skewed',
          'Interpret dot plots, line graphs, sector graphs and divided bar charts'
        ]
      },
      {
        num: 2,
        title: 'Histograms & Polygons',
        slides: 'assets/2__Data_Analysis__Histograms___Polygons.pdf',
        annotated: 'assets/annotated/ANNOTATED%202__Data_Analysis__Histograms___Polygons.pdf',
        kind: 'pdf',
        syllabus: [
          'Use spreadsheets to organise and represent data using appropriate displays',
          'Represent data using frequency distribution tables with histograms and polygons',
          'Select appropriate graph types and justify choices',
          'Explain how graphical representations can lead to misinterpretation',
          'Interpret box plots and histograms to draw conclusions'
        ]
      },
      {
        num: 3,
        title: 'Measures of Centre and Spread',
        slides: 'assets/3__Data_Analysis__Measures_of_Centre_and_Spread.pdf',
        annotated: 'assets/annotated/ANNOTATED%203__Data_Analysis__Measures_of_Centre_and_Spread.pdf',
        kind: 'pdf',
        syllabus: [
          'Describe and calculate mean, median and mode using digital tools',
          'Identify datasets as uniform, unimodal, bimodal or multimodal',
          'Identify range and standard deviation as measures of variation',
          'Calculate range and population standard deviation using digital tools',
          'Compare datasets using measures of centre and spread',
          'Justify appropriate uses of each measure',
          'Identify real-world examples of appropriate and inappropriate use'
        ]
      },
      {
        num: 4,
        title: 'Quartiles, Box Plots and Outliers',
        slides: 'assets/4__Data_Analysis__Quartiles__Box_Plots_and_Outliers.pdf',
        annotated: 'assets/annotated/ANNOTATED%204__Data_Analysis__Quartiles__Box_Plots_and_Outliers.pdf',
        kind: 'pdf',
        syllabus: [
          'Determine quartiles from datasets or graphical representations',
          'Determine the interquartile range (IQR)',
          'Represent data using box plots displaying five-number summaries',
          'Compare measures of centre, spread and shape using box plots',
          'Identify clusters, gaps and outliers and explain their occurrence',
          'Apply Q1 − 1.5×IQR and Q3 + 1.5×IQR to formally identify outliers',
          'Explain the impact of outliers on measures of centre and spread'
        ]
      },
      {
        num: 5,
        title: 'Statistical Investigation Process and Sampling',
        slides: 'lesson-05-statistical-investigation-process-and-sampling.html',
        annotated: null,
        kind: 'html',
        syllabus: [
          'Identify an issue and pose a question to a targeted population',
          'Develop a survey applying questionnaire design principles',
          'Examine issues of privacy, ethics and responsiveness to diverse groups',
          'Compare systematic, self-selected, random and stratified sampling',
          'Justify whether a sample is representative of a population',
          'Describe potential faults in survey design and misrepresentations'
        ]
      },
      {
        num: 6,
        homework: true,
        slides: 'assets/Data_Analysis_Questions.pdf',
        annotated: null,
        kind: 'pdf',
        syllabus: []
      }
    ];

    let currentLessonIndex = 0;
    let currentVariant = 'slides';
    let currentLessonFile = '';
    let currentLessonKind = 'pdf';

    const pdfFrame = document.getElementById('pdfFrame');
    const downloadBtn = document.getElementById('downloadBtn');
    const openExternalBtn = document.getElementById('openExternalBtn');

    function initializeLessons() {
      const lessonsList = document.getElementById('lessonsList');
      lessons.forEach((lesson, index) => {
        const group = document.createElement('div');
        group.className = 'lesson-group' + (index === 0 ? ' active' : '');
        group.dataset.index = index;

        const kindLabel = lesson.kind === 'html' ? 'Interactive' : 'PDF';
        const syllabusHtml = lesson.syllabus && lesson.syllabus.length > 0
          ? `<div class="lesson-syllabus-dots"><ul>${lesson.syllabus.map(d => `<li>${d}</li>`).join('')}</ul></div>`
          : '';

        let inner = `
          <div class="lesson-group-header">
            <span class="lesson-group-num">${lesson.homework ? 'Homework' : 'Lesson ' + lesson.num}</span>
            <span class="lesson-kind-badge">${kindLabel}</span>
          </div>
        `;
        if (!lesson.homework) {
          inner += `<div class="lesson-group-title">${lesson.title}</div>`;
        }
        inner += syllabusHtml;

        if (lesson.annotated) {
          inner += `
            <div class="lesson-variants">
              <button class="variant-btn active" data-lesson="${index}" data-variant="slides">Slides</button>
              <button class="variant-btn" data-lesson="${index}" data-variant="annotated">Annotated</button>
            </div>
          `;
        }

        group.innerHTML = inner;

        group.addEventListener('click', () => {
          loadFile(index, currentLessonIndex === index ? currentVariant : 'slides');
        });
        if (lesson.annotated) {
          group.querySelectorAll('.variant-btn').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();
              loadFile(parseInt(btn.dataset.lesson), btn.dataset.variant);
            });
          });
        }

        lessonsList.appendChild(group);
      });
    }

    function updateSidebarActive(lessonIndex, variant) {
      document.querySelectorAll('.lesson-group').forEach((g, i) => {
        g.classList.toggle('active', i === lessonIndex);
      });
      const activeGroup = document.querySelectorAll('.lesson-group')[lessonIndex];
      if (activeGroup) {
        activeGroup.querySelectorAll('.variant-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.variant === variant);
        });
      }
    }

    function loadFile(lessonIndex, variant) {
      const lesson = lessons[lessonIndex];
      const file = variant === 'annotated' && lesson.annotated ? lesson.annotated : lesson.slides;
      const kind = lesson.kind;

      currentLessonIndex = lessonIndex;
      currentVariant = variant;
      currentLessonFile = file;
      currentLessonKind = kind;

      updateSidebarActive(lessonIndex, variant);

      downloadBtn.style.display = kind === 'pdf' ? 'inline-flex' : 'none';
      openExternalBtn.textContent = kind === 'html' ? '↗ Open lesson' : '↗ Open PDF';
      openExternalBtn.href = file;

      pdfFrame.src = file;
    }

    function downloadCurrent() {
      const link = document.createElement('a');
      link.href = currentLessonFile;
      link.download = decodeURIComponent(currentLessonFile.split('/').pop());
      link.click();
    }

    initializeLessons();
    loadFile(0, 'slides');
  </script>
</body>
</html>
