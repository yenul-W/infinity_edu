<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Analysis — Year 11 Maths Standard</title>
  <link rel="stylesheet" href="../../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #0ea5e9;
    }

    .pdf-viewer-container {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .lessons-sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .lesson-btn {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 0.9rem 1.1rem;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.2s ease;
      color: var(--ink);
      position: relative;
    }

    .lesson-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--ink-faint);
      margin-bottom: 0.25rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .lesson-title {
      font-size: 0.88rem;
      color: var(--ink-soft);
      font-weight: 600;
      line-height: 1.3;
    }

    .lesson-kind {
      margin-top: 0.3rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .lesson-btn:hover {
      border-color: var(--accent);
      background: rgba(14, 165, 233, 0.08);
      transform: translateX(3px);
    }

    .lesson-btn.active {
      background: rgba(14, 165, 233, 0.1);
      border-color: var(--accent);
      border-left-width: 4px;
    }

    .lesson-btn.active .lesson-title {
      color: var(--ink);
    }

    .pdf-viewer-main {
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .pdf-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface-light);
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .pdf-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      text-decoration: none;
    }

    .pdf-btn:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    .pdf-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .page-info {
      font-size: 0.78rem;
      color: var(--ink-faint);
      font-family: var(--font-mono);
      font-weight: 500;
      min-width: 80px;
      text-align: center;
    }

    .zoom-control {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.2rem;
      background: var(--card-bg);
    }

    .zoom-btn {
      background: transparent;
      border: none;
      color: var(--ink-soft);
      cursor: pointer;
      padding: 0.3rem 0.55rem;
      font-weight: 700;
      font-size: 1rem;
      transition: color 0.2s;
      line-height: 1;
    }

    .zoom-btn:hover {
      color: var(--accent);
    }

    .zoom-display {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      padding: 0 0.5rem;
      color: var(--ink-faint);
      font-weight: 600;
      min-width: 42px;
      text-align: center;
    }

    #pdf-canvas {
      display: block;
      margin: auto;
      max-width: 100%;
    }

    .pdf-viewer {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
      background: var(--surface-light);
      min-height: 520px;
      overflow: auto;
    }

    .pdf-loading {
      text-align: center;
      color: var(--ink-faint);
      padding: 3rem;
      align-self: center;
    }

    .pdf-loading-spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }

    .pdf-loading p {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 900px) {
      .pdf-viewer-container {
        grid-template-columns: 1fr;
      }

      .lessons-sidebar {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }
    }

    @media (max-width: 600px) {
      .lessons-sidebar {
        grid-template-columns: 1fr;
      }

      .pdf-controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .pdf-btn {
        font-size: 0.75rem;
        padding: 0.4rem 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>
  <div class="gradient-orb orb-3"></div>

  <header class="topic-header">
    <div class="header-inner">
      <a href="../../index.html" class="back-link">&larr; All Topics</a>
      <h1 class="topic-page-title">Data <em>Analysis</em></h1>
    </div>
  </header>

  <main class="main-content">
    <div style="max-width: 1100px; margin: 0 auto;">
      <div class="pdf-viewer-container">
        <div class="lessons-sidebar" id="lessonsList"></div>

        <div class="pdf-viewer-main">
          <div class="pdf-controls">
            <div class="control-group" id="fileControls">
              <button class="pdf-btn" id="downloadBtn" onclick="downloadPDF()">&#8595; Download</button>
              <a id="openExternalBtn" class="pdf-btn" style="cursor:pointer;" rel="noreferrer">&#8599; Open</a>
            </div>

            <div class="control-group" id="zoomControls">
              <div class="zoom-control">
                <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
                <span class="zoom-display" id="zoomLevel">100%</span>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
              </div>
            </div>

            <div class="page-info" id="pageInfo">Loading...</div>
          </div>

          <div class="pdf-viewer" id="pdfViewerContainer">
            <div class="pdf-loading">
              <div class="pdf-loading-spinner"></div>
              <p>Loading...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>Year 11 Mathematics Standard</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const currentDir = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));

    const lessons = [
      { title: 'Descriptive Statistics', file: currentDir + '/assets/1__Data_Analysis__Descriptive_Statistics.pdf', kind: 'pdf' },
      { title: 'Histograms & Polygons', file: currentDir + '/assets/2__Data_Analysis__Histograms___Polygons.pdf', kind: 'pdf' },
      { title: 'Measures of Centre and Spread', file: currentDir + '/assets/3__Data_Analysis__Measures_of_Centre_and_Spread.pdf', kind: 'pdf' },
      { title: 'Quartiles, Box Plots and Outliers', file: currentDir + '/assets/4__Data_Analysis__Quartiles__Box_Plots_and_Outliers.pdf', kind: 'pdf' },
      { title: 'Statistical Investigation Process and Sampling', file: currentDir + '/lesson-05-statistical-investigation-process-and-sampling.html', kind: 'html' },
      { title: 'Topic Homework', file: currentDir + '/assets/Data_Analysis_Questions.pdf', kind: 'pdf' }
    ];

    let currentLessonIndex = 0;
    let currentLessonFile = '';
    let currentLessonKind = 'pdf';
    let currentPdfDoc = null;
    let currentPage = 1;
    let zoomLevel = 100;

    const pdfViewerContainer = document.getElementById('pdfViewerContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const openExternalBtn = document.getElementById('openExternalBtn');
    const zoomLevelEl = document.getElementById('zoomLevel');
    const zoomControls = document.getElementById('zoomControls');

    function initializeLessons() {
      const lessonsList = document.getElementById('lessonsList');
      lessons.forEach((lesson, index) => {
        const btn = document.createElement('button');
        btn.className = 'lesson-btn' + (index === 0 ? ' active' : '');
        btn.innerHTML = `
          <div class="lesson-num">Lesson ${index + 1}</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-kind">${lesson.kind === 'pdf' ? 'PDF' : 'Interactive'}</div>
        `;
        btn.onclick = () => loadLesson(index);
        lessonsList.appendChild(btn);
      });
    }

    async function renderPage(pageNum) {
      if (!currentPdfDoc) return;
      const page = await currentPdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: zoomLevel / 100 });

      let canvas = document.getElementById('pdf-canvas');
      if (!canvas) {
        canvas = document.createElement('canvas');
        canvas.id = 'pdf-canvas';
        pdfViewerContainer.innerHTML = '';
        pdfViewerContainer.appendChild(canvas);
      }

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      const context = canvas.getContext('2d');
      await page.render({ canvasContext: context, viewport }).promise;
    }

    async function loadLesson(index) {
      currentLessonIndex = index;
      currentLessonFile = lessons[index].file;
      currentLessonKind = lessons[index].kind;
      currentPage = 1;
      zoomLevel = 100;

      document.querySelectorAll('.lesson-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });

      downloadBtn.style.display = currentLessonKind === 'pdf' ? 'inline-flex' : 'none';
      zoomControls.style.display = currentLessonKind === 'pdf' ? 'flex' : 'none';

      openExternalBtn.textContent = currentLessonKind === 'pdf' ? '↗ Open PDF' : '↗ Open lesson';
      openExternalBtn.href = currentLessonFile;
      openExternalBtn.target = '_blank';

      if (currentLessonKind === 'pdf') {
        pdfViewerContainer.innerHTML = '<div class="pdf-loading"><div class="pdf-loading-spinner"></div><p>Loading PDF...</p></div>';
        try {
          currentPdfDoc = await pdfjsLib.getDocument(currentLessonFile).promise;
          await renderPage(currentPage);
          updatePageInfo();
        } catch (e) {
          pdfViewerContainer.innerHTML = '<div class="pdf-loading"><p>Could not load PDF. <a href="' + currentLessonFile + '" target="_blank" style="color:var(--accent);">Download instead</a></p></div>';
        }
      } else {
        currentPdfDoc = null;
        document.getElementById('pageInfo').textContent = '';
        pdfViewerContainer.innerHTML = '<iframe src="' + currentLessonFile + '" style="width:100%;height:100%;border:none;min-height:600px;"></iframe>';
      }
    }

    function updatePageInfo() {
      if (currentPdfDoc) {
        document.getElementById('pageInfo').textContent = currentPage + ' / ' + currentPdfDoc.numPages;
      }
    }

    function downloadPDF() {
      const link = document.createElement('a');
      link.href = currentLessonFile;
      link.download = currentLessonFile.split('/').pop();
      link.click();
    }

    function zoomIn() {
      zoomLevel = Math.min(zoomLevel + 20, 300);
      zoomLevelEl.textContent = zoomLevel + '%';
      renderPage(currentPage);
    }

    function zoomOut() {
      zoomLevel = Math.max(zoomLevel - 20, 50);
      zoomLevelEl.textContent = zoomLevel + '%';
      renderPage(currentPage);
    }

    initializeLessons();
    loadLesson(0);

    // Cursor parallax
    document.addEventListener('mousemove', (e) => {
      const orbs = document.querySelectorAll('.gradient-orb');
      orbs.forEach((orb, index) => {
        const x = (e.clientX / window.innerWidth) * (50 - index * 10);
        const y = (e.clientY / window.innerHeight) * (50 - index * 10);
        orb.style.transform = `translate(${x}px, ${y}px)`;
      });
    });
  </script>
</body>
</html>
