<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earning Money — Year 11 Maths Standard</title>
  <link rel="stylesheet" href="../../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="sociotype">

  <header class="topic-header">
    <div class="header-inner">
      <div class="header-nav">
        <a href="../../index.html" class="back-link">&larr; All Topics</a>
        <div class="header-actions">
          <a class="syllabus-chip-inline" href="https://curriculum.nsw.edu.au/learning-areas/mathematics/mathematics-standard-11-12-2024/content/year-11/faacdf9b3d" target="_blank" rel="noreferrer noopener">Syllabus &#8599;</a>
          <button id="darkModeToggle" class="dark-mode-btn" title="Toggle dark mode"><span class="toggle-icon">dark</span></button>
        </div>
      </div>
      <h1 class="topic-page-title">Earning <em>Money</em></h1>
    </div>
  </header>

  <main class="main-content">
    <div class="pdf-viewer-container">
      <div class="lessons-sidebar" id="lessonsList"></div>
      <div class="pdf-viewer-main">
        <div class="pdf-controls">
          <div class="control-group" id="fileControls">
            <button class="pdf-btn" id="downloadBtn">&#8595; Download</button>
            <a class="pdf-btn" id="openExternalBtn" href="#" target="_blank" rel="noreferrer">&#8599; Open</a>
            <button class="pdf-btn" id="printSyllabusBtn">&#8942; Print Syllabus</button>
          </div>
          <div class="control-group" id="pageControls">
            <button class="pdf-nav-arrow" id="prevPage" disabled>&#8592;</button>
            <span class="page-info" id="pageInfo">&#8212; / &#8212;</span>
            <button class="pdf-nav-arrow" id="nextPage" disabled>&#8594;</button>
          </div>
          <div class="control-group" id="zoomControls">
            <div class="zoom-control">
              <button class="zoom-btn" id="zoomOut">&#8722;</button>
              <span class="zoom-display" id="zoomDisplay">&#8212;</span>
              <button class="zoom-btn" id="zoomIn">+</button>
            </div>
          </div>
        </div>
        <div class="pdf-stage" id="pdfStage">
          <div class="pdf-loading" id="pdfLoading">
            <div class="pdf-loading-spinner"></div>
            <p>Loading</p>
          </div>
          <div class="pdf-canvas-wrapper" id="pdfCanvasWrapper" style="display:none">
            <canvas id="pdfCanvas"></canvas>
          </div>
          <iframe class="pdf-html-frame" id="pdfHtmlFrame" src="about:blank" title="Lesson"></iframe>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p>Year 11 Mathematics Standard</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../../pdf-viewer.js"></script>
  <script>
    const toggle = document.getElementById('darkModeToggle');
    const toggleIcon = toggle.querySelector('.toggle-icon');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = saved ? saved === 'dark' : prefersDark;
    if (isDark) { html.classList.add('dark-mode'); toggleIcon.textContent = 'light'; }
    else { html.classList.remove('dark-mode'); toggleIcon.textContent = 'dark'; }
    toggle.addEventListener('click', () => {
      const nowDark = html.classList.toggle('dark-mode');
      localStorage.setItem('theme', nowDark ? 'dark' : 'light');
      toggleIcon.textContent = nowDark ? 'light' : 'dark';
    });

    const TOPIC_ID = 2;

    const lessons = [
      {
        num: 1,
        title: 'Ways of Earning',
        slides: 'assets/1__Earning_Money___Ways_of_Earning.pdf',
        annotated: 'assets/annotated/ANNOTATED%201__Earning_Money___Ways_of_Earning.pdf',
        kind: 'pdf',
        syllabus: [
          'Solve problems involving salaries',
          'Solve problems involving overtime and penalty rates (nights, weekends, public holidays)',
          'Calculate earnings from commissions, sliding scale commission, bonuses, allowances and royalties',
          'Calculate weekly, fortnightly, monthly and yearly earnings (1 year = 52 weeks)',
          'Calculate leave loading as a percentage of eligible normal pay',
          'Use spreadsheets to model employee income including overtime, allowances and commissions'
        ]
      },
      {
        num: 2,
        title: 'Taxation',
        slides: 'assets/2__Earning_Money___Taxation.pdf',
        annotated: 'assets/annotated/ANNOTATED%202__Earning_Money___Taxation.pdf',
        kind: 'pdf',
        syllabus: [
          'Determine taxable income by examining allowable deductions',
          'Determine tax payable by interpreting and applying tax tables',
          'Calculate weekly, fortnightly or monthly tax deductions using tax tables',
          'Calculate Medicare levy from taxable income',
          'Calculate net pay after deductions, taxation and Medicare levy',
          'Determine whether additional tax is payable or a refund is owed',
          'Use spreadsheets to model taxation scenarios'
        ]
      },
      {
        num: 3,
        homework: true,
        slides: 'Earning_Money_Questions.pdf',
        annotated: null,
        kind: 'pdf',
        syllabus: []
      }
    ];

    initPdfViewer({ topicId: TOPIC_ID, lessons });
  </script>
</body>
</html>
